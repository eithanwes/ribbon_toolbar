<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#0078d4"/>
  <!-- Ribbon tab bar -->
  <rect x="2" y="2" width="28" height="8" rx="2" fill="#ffffff" opacity="0.15"/>
  <!-- Tab 1 (active) -->
  <rect x="3" y="3" width="8" height="6" rx="1.5" fill="#ffffff"/>
  <!-- Tab 2 -->
  <rect x="12" y="3" width="7" height="6" rx="1.5" fill="#ffffff" opacity="0.4"/>
  <!-- Tab 3 -->
  <rect x="20" y="3" width="7" height="6" rx="1.5" fill="#ffffff" opacity="0.4"/>
  <!-- Ribbon content area -->
  <rect x="2" y="11" width="28" height="19" rx="2" fill="#ffffff" opacity="0.9"/>
  <!-- Button group separator -->
  <line x1="14" y1="13" x2="14" y2="28" stroke="#d0d0d0" stroke-width="0.75"/>
  <line x1="22" y1="13" x2="22" y2="28" stroke="#d0d0d0" stroke-width="0.75"/>
  <!-- Large button 1 -->
  <rect x="4" y="13" width="8" height="8" rx="1" fill="#0078d4" opacity="0.15"/>
  <rect x="5" y="14" width="6" height="5" rx="0.5" fill="#0078d4" opacity="0.5"/>
  <rect x="5" y="21" width="6" height="1.5" rx="0.5" fill="#666666" opacity="0.5"/>
  <!-- Small buttons -->
  <rect x="15" y="13" width="6" height="2.5" rx="0.5" fill="#0078d4" opacity="0.3"/>
  <rect x="15" y="17" width="6" height="2.5" rx="0.5" fill="#0078d4" opacity="0.3"/>
  <rect x="15" y="21" width="6" height="2.5" rx="0.5" fill="#0078d4" opacity="0.3"/>
  <!-- Small buttons right -->
  <rect x="23" y="13" width="6" height="2.5" rx="0.5" fill="#0078d4" opacity="0.3"/>
  <rect x="23" y="17" width="6" height="2.5" rx="0.5" fill="#0078d4" opacity="0.3"/>
  <rect x="23" y="21" width="6" height="2.5" rx="0.5" fill="#0078d4" opacity="0.3"/>
</svg>
